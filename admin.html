<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Product</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1><i class="fas fa-cog"></i> Admin Panel</h1>
                <a href="index.html" class="home-btn"><i class="fas fa-home"></i> View Products</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="admin-form">
            <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label for="title">Product Title *</label>
                    <input type="text" id="title" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="buyerLink">Buyer Link (WhatsApp/Website)</label>
                    <input type="url" id="buyerLink" placeholder="https://wa.me/1234567890">
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" placeholder="Electronics, Clothing, etc.">
                </div>
                
                <div class="form-group">
                    <label for="photos">Product Photos</label>
                    <div class="photo-preview" id="photoPreview"></div>
                    <input type="file" id="photos" multiple accept="image/*">
                    <small>Upload up to 4 photos (JPG, PNG)</small>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-save"></i> Add Product
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Focus on admin form
        window.onload = function() {
            document.getElementById('title').focus();
        };
    </script>
</body>
</html>
